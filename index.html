<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyCast Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default-bg">

  <nav class="navbar navbar-dark py-3">
    <div class="container-fluid px-5">
      <span class="navbar-brand fw-bold fs-3">SkyCast</span>
      <button id="toggleMode" class="btn btn-outline-light rounded-pill">🌙 Dark Mode</button>
    </div>
  </nav>

  <div class="container-fluid px-lg-5 mt-4">
    <div class="row g-4">
      <div class="col-lg-4 col-xl-3">
        <div class="glass-card p-4 animate__animated animate__fadeInLeft">
          <h4 class="mb-4 fw-semibold">Location Search</h4>
          <div class="input-group mb-3">
            <input type="text" id="cityInput" class="form-control glass-input" placeholder="Enter city name...">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>
          <div id="error" class="text-warning mb-3 small fw-bold"></div>

          <div class="history-section mt-5">
            <h6 class="text-uppercase small opacity-75 fw-bold mb-3 border-bottom pb-2">Recent Searches</h6>
            <div id="historyList" class="d-flex flex-column gap-2"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-8 col-xl-9">
        <div id="loader" class="text-center d-none py-5">
          <div class="spinner-border text-light" role="status"></div>
          <p class="mt-3">Consulting the clouds...</p>
        </div>

        <div id="weatherContent" class="d-none animate__animated animate__fadeIn">
          <div class="glass-card p-5 mb-4 text-center text-md-start">
            <div class="row align-items-center">
              <div class="col-md-6">
                <h1 id="cityName" class="display-3 fw-bold mb-0">City Name</h1>
                <p id="weatherDesc" class="fs-4 opacity-75 text-capitalize">Weather Condition</p>
                <div id="mainTemp" class="display-1 fw-bold">0°C</div>
              </div>
              <div class="col-md-6 text-center">
                <div id="weatherEmoji" style="font-size: 8rem;">☀️</div>
              </div>
            </div>
          </div>

          <div class="row g-4">
            <div class="col-md-3">
              <div class="glass-card p-4 text-center">
                <small class="opacity-75 text-uppercase fw-bold">Humidity</small>
                <h3 id="statHumidity" class="mt-2">--%</h3>
              </div>
            </div>
            <div class="col-md-3">
              <div class="glass-card p-4 text-center">
                <small class="opacity-75 text-uppercase fw-bold">Wind Speed</small>
                <h3 id="statWind" class="mt-2">-- km/h</h3>
              </div>
            </div>
            <div class="col-md-3">
              <div class="glass-card p-4 text-center">
                <small class="opacity-75 text-uppercase fw-bold">Feels Like</small>
                <h3 id="statFeels" class="mt-2">--°C</h3>
              </div>
            </div>
            <div class="col-md-3">
              <div class="glass-card p-4 text-center">
                <small class="opacity-75 text-uppercase fw-bold">UV Index</small>
                <h3 id="statUV" class="mt-2">--</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
